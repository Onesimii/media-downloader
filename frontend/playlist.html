<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist Manager – Media Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f1a;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.10);
            --accent: #7c6ef5;
            --accent2: #e96bff;
            --text: #e8eaf0;
            --muted: #9096ac;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 80px;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124, 110, 245, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(233, 107, 255, 0.12) 0%, transparent 60%);
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #e96bff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .playlist-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .playlist-cover {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .playlist-meta h2 {
            font-size: 1.25rem;
            margin-bottom: 4px;
        }

        .playlist-meta p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: space-between;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }

        .track-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .track-item:last-child {
            border-bottom: none;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox.checked::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .track-artist {
            font-size: 0.8rem;
            color: var(--muted);
        }

        #progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 15, 26, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .progress-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.3s;
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-sub {
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .playlist-card {
                flex-direction: column;
                text-align: center;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Spotify Playlist</h1>
        </header>

        <div id="playlist-header"></div>

        <div class="controls">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" onclick="selectAll(true)">Check All</button>
                <button class="btn btn-secondary" onclick="selectAll(false)">Uncheck</button>
            </div>
            <button id="dl-btn" class="btn btn-primary" onclick="startBatchDownload()">Download Selected</button>
        </div>

        <div id="track-list" class="track-list">
            <div style="padding:40px; text-align:center; color:var(--muted);">Loading playlist...</div>
        </div>
    </div>

    <div id="progress-overlay">
        <div class="progress-box">
            <div id="status-main" class="status-text">Starting...</div>
            <div id="status-sub" class="status-sub">Preparing tracks...</div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
            <button id="cancel-btn" class="btn btn-secondary" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        const API = "";
        const params = new URLSearchParams(window.location.search);
        const playlistUrl = params.get('url');
        let tracks = [];

        async function loadPlaylist() {
            if (!playlistUrl) {
                alert("No playlist URL provided.");
                window.location.href = "/";
                return;
            }
            try {
                const res = await fetch(`${API}/playlist-info?url=${encodeURIComponent(playlistUrl)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Failed to load");

                document.getElementById('playlist-header').innerHTML = `
          <div class="playlist-card">
            <img class="playlist-cover" src="${data.thumbnail || 'https://via.placeholder.com/300'}" />
            <div class="playlist-meta">
              <h2>${data.title}</h2>
              <p>${data.tracks.length} tracks (Limit: 30)</p>
            </div>
          </div>
        `;

                tracks = data.tracks;
                renderTracks();
            } catch (err) {
                document.getElementById('track-list').innerHTML = `<div style="padding:40px; color:#f87171;">Error: ${err.message}</div>`;
            }
        }

        function renderTracks() {
            const container = document.getElementById('track-list');
            container.innerHTML = tracks.map((t, i) => `
        <div class="track-item" onclick="toggleTrack(${i})">
          <div class="checkbox ${t.selected ? 'checked' : ''}" id="check-${i}"></div>
          <div class="track-info">
            <div class="track-name">${t.title}</div>
            <div class="track-artist">${t.artist}</div>
          </div>
        </div>
      `).join('');
        }

        function toggleTrack(i) {
            tracks[i].selected = !tracks[i].selected;
            document.getElementById(`check-${i}`).classList.toggle('checked');
        }

        function selectAll(val) {
            tracks.forEach(t => t.selected = val);
            document.querySelectorAll('.checkbox').forEach(c => {
                val ? c.classList.add('checked') : c.classList.remove('checked');
            });
        }

        async function startBatchDownload() {
            const selected = tracks.filter(t => t.selected);
            if (selected.length === 0) return alert("Select at least one song!");
            if (selected.length > 30) return alert("Playlist limited to 30 songs.");

            const overlay = document.getElementById('progress-overlay');
            const statusMain = document.getElementById('status-main');
            const statusSub = document.getElementById('status-sub');
            const fill = document.getElementById('progress-fill');

            overlay.style.display = 'flex';

            try {
                const res = await fetch(`${API}/start-playlist-download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playlist_name: "SpotifyPlaylist",
                        tracks: selected.map(t => `${t.artist} - ${t.title}`)
                    })
                });
                const { job_id } = await res.json();

                const poll = setInterval(async () => {
                    const pRes = await fetch(`${API}/progress/${job_id}`);
                    const job = await pRes.json();

                    if (job.status === 'ready') {
                        clearInterval(poll);
                        statusMain.innerText = "Packed!";
                        statusSub.innerText = "Downloading ZIP archive...";
                        fill.style.width = "100%";
                        setTimeout(() => {
                            window.location.href = `${API}/download-file/${job_id}`;
                            overlay.style.display = 'none';
                        }, 1000);
                    } else if (job.status === 'error') {
                        clearInterval(poll);
                        alert("Error: " + job.error);
                        overlay.style.display = 'none';
                    } else {
                        statusMain.innerText = job.status + "...";
                        statusSub.innerText = job.progress_text || "";
                        fill.style.width = (job.progress || 0) + "%";
                    }
                }, 1500);

            } catch (err) {
                alert("Failed to start download");
                overlay.style.display = 'none';
            }
        }

        loadPlaylist();
    </script>
</body>

</html>
