<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Downloader – YouTube, TikTok & Instagram</title>
  <meta name="description"
    content="Download videos from YouTube, TikTok and Instagram in any format or as MP3 audio." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.10);
      --accent: #7c6ef5;
      --accent2: #e96bff;
      --text: #e8eaf0;
      --muted: #9096ac;
      --success: #3dd68c;
      --danger: #f87171;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;

      background-image:Fix my FastAPI backend that uses yt-dlp to fetch YouTube video formats. Problem: When users paste a YouTube link,
      yt-dlp returns the error: "Sign in to confirm you're not a bot. Use --cookies-from-browser or --cookies" . Update the yt-dlp configuration to reduce YouTube bot detection. Requirements: 1. Update yt-dlp options to mimic a real client. 2. Use the YouTube Android player client in extractor_args. 3. Enable quiet mode and ignore certificate issues. 4. Ensure the code still returns available formats correctly. 5. Handle errors safely so the server does not crash. Example configuration expected: ydl_opts= {

        "quiet": True,
        "nocheckcertificate": True,
        "extractor_args": {
          "youtube": {
            "player_client": ["android"]
          }
        }
      }

      Provide the corrected Python code for the FastAPI function that fetches video formats using yt-dlp. radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124, 110, 245, 0.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(233, 107, 255, 0.12) 0%, transparent 60%);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .logo {
      font-size: 2.8rem;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #e96bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .badge:hover {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    .badge:active {
      transform: scale(0.94);
    }

    .badge.yt {
      background: rgba(255, 0, 0, 0.15);
      color: #ff7070;
      border: 1px solid rgba(255, 0, 0, 0.25);
    }

    .badge.yt:hover {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      background: rgba(255, 0, 0, 0.22);
      border-color: rgba(255, 0, 0, 0.4);
    }

    .badge.tt {
      background: rgba(0, 242, 234, 0.1);
      color: #00f2ea;
      border: 1px solid rgba(0, 242, 234, 0.2);
    }

    .badge.tt:hover {
      box-shadow: 0 0 15px rgba(0, 242, 234, 0.35);
      background: rgba(0, 242, 234, 0.18);
      border-color: rgba(0, 242, 234, 0.4);
    }

    .badge.ig {
      background: rgba(233, 107, 255, 0.12);
      color: #e96bff;
      border: 1px solid rgba(233, 107, 255, 0.25);
    }

    .badge.ig:hover {
      box-shadow: 0 0 15px rgba(233, 107, 255, 0.4);
      background: rgba(233, 107, 255, 0.2);
      border-color: rgba(233, 107, 255, 0.4);
    }

    .badge.sp {
      background: rgba(30, 215, 96, 0.12);
      color: #1ed760;
      border: 1px solid rgba(30, 215, 96, 0.25);
    }

    .badge.sp:hover {
      box-shadow: 0 0 15px rgba(30, 215, 96, 0.4);
      background: rgba(30, 215, 96, 0.2);
      border-color: rgba(30, 215, 96, 0.4);
    }

    .badge.sc {
      background: rgba(255, 136, 0, 0.12);
      color: #ff8800;
      border: 1px solid rgba(255, 136, 0, 0.25);
    }

    .badge.sc:hover {
      box-shadow: 0 0 15px rgba(255, 136, 0, 0.4);
      background: rgba(255, 136, 0, 0.2);
      border-color: rgba(255, 136, 0, 0.4);
    }

    /* Range Toggle Switch Styles */
    .mode-switcher {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: 12px;
      width: fit-content;
      margin: 20px auto 0;
      position: relative;
      user-select: none;
    }

    .mode-btn {
      padding: 8px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mode-btn.active {
      color: #fff;
    }

    .mode-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      width: calc(50% - 4px);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(124, 110, 245, 0.3);
    }

    .pro-badge-header {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(233, 107, 255, 0.15);
      color: #e96bff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid rgba(233, 107, 255, 0.3);
      margin-top: 12px;
    }

    .upgrade-section {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .btn-pro {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      font-weight: 800;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      border: none;
    }

    .music-active .mode-slider {
      transform: translateX(100%);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
      overflow: hidden;
      min-height: 32px;
    }

    .badges-container {
      display: flex;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    .badges-video,
    .badges-music {
      display: flex;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 28px;
      width: 100%;
      max-width: 640px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #url-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #url-input:focus {
      border-color: var(--accent);
    }

    #url-input::placeholder {
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-dl {
      background: rgba(124, 110, 245, 0.18);
      border: 1px solid rgba(124, 110, 245, 0.35);
      color: #c4b5fd;
      font-size: 0.8rem;
      padding: 7px 14px;
      border-radius: 8px;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--muted);
    }

    .btn-audio {
      background: rgba(61, 214, 140, 0.15);
      border: 1px solid rgba(61, 214, 140, 0.3);
      color: var(--success);
      font-size: 0.85rem;
      padding: 10px 18px;
      border-radius: 8px;
      width: 100%;
      justify-content: center;
      margin-top: 16px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #result {
      margin-top: 24px;
    }

    .video-info {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      align-items: flex-start;
    }

    .thumb {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: #1a1d2e;
    }

    .thumb-placeholder {
      width: 120px;
      height: 68px;
      border-radius: 8px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1226, #1a1d2e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .video-meta h2 {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 6px;
    }

    .video-meta .duration {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .formats-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .formats-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .formats-grid::-webkit-scrollbar {
      width: 4px;
    }

    .formats-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .formats-grid::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .fmt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: background 0.15s;
    }

    .fmt-row:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .fmt-res {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .fmt-info {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 18px 0;
    }

    .error-box {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--danger);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .dl-link {
      text-decoration: none;
    }

    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    /* New styles for progress tracking */
    .progress-card {
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: none;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-status {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: capitalize;
    }

    .progress-pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s ease;
    }

    .btn-ready {
      background: var(--success) !important;
      color: #000 !important;
      width: 100%;
      justify-content: center;
      margin-top: 12px;
      display: none;
    }

    /* Mobile Responsiveness Improvements */
    @media (max-width: 768px) {
      body {
        padding: 20px 16px 40px;
      }

      header {
        margin-bottom: 32px;
      }

      header h1 {
        font-size: 1.75rem;
      }

      .card {
        padding: 20px;
      }

      .badge-row {
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .badge {
        padding: 8px 16px;
        font-size: 0.85rem;
      }

      .input-row {
        flex-direction: column;
        gap: 12px;
      }

      #url-input {
        width: 100%;
        padding: 14px;
      }

      .btn {
        width: 100%;
        justify-content: center;
        padding: 14px;
        font-size: 1rem;
      }

      .video-info {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .thumb,
      .thumb-placeholder {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }

      .fmt-row {
        padding: 14px;
      }

      .fmt-res {
        font-size: 1rem;
      }

      .btn-dl {
        padding: 10px 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">⬇️</div>
    <h1>Media Downloader</h1>
    <p>Download videos and audio in seconds</p>
    <div class="mode-switcher" id="mode-switcher">
      <div class="mode-slider"></div>
      <div class="mode-btn active" onclick="setMode('video')">🎬 Video</div>
      <div class="mode-btn" onclick="setMode('music')">🎵 Music</div>
    </div>

    <div class="upgrade-section">
      <div id="user-status-display"></div>
      <button id="upgrade-btn" class="btn btn-pro hidden" onclick="upgradeToPro()">⭐ Upgrade to PRO</button>
    </div>

    <div class="badge-row">
      <div id="video-badges" class="badges-video">
        <span class="badge yt">YouTube</span>
        <span class="badge tt">TikTok</span>
        <span class="badge ig">Instagram</span>
      </div>
      <div id="music-badges" class="badges-music hidden">
        <span class="badge sp">Spotify</span>
        <span class="badge sc">SoundCloud</span>
        <span class="badge yt">YouTube MP3</span>
      </div>
    </div>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="url-input" placeholder="Paste video URL here…" autocomplete="off" />
      <button class="btn btn-secondary" id="paste-btn" onclick="pasteURL()">
        <span>📋 Paste Link</span>
      </button>
      <button class="btn btn-primary" id="fetch-btn" onclick="fetchFormats()">
        <span>Fetch</span>
      </button>
    </div>
    <!-- Progress display -->
    <div id="progress-container" class="progress-card">
      <div class="progress-header">
        <div id="status-text" class="progress-status">Preparing...</div>
        <div id="status-pct" class="progress-pct">0%</div>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill"></div>
      </div>
      <button id="save-btn" class="btn btn-ready">✅ Save File</button>
    </div>

    <div id="result"></div>
  </div>

  <footer>Media Downloader — for personal use only. Respect copyright laws.</footer>

  <script>
    const API = ""; // API is served from the same origin
    let currentMode = 'video';
    let lastFetchedData = null;
    let lastFetchedUrl = "";
    let userId = localStorage.getItem('md_user_id');

    if (!userId) {
      userId = 'u_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('md_user_id', userId);
    }

    async function checkUserStatus() {
      try {
        const res = await fetch(`${API}/user-status/${userId}`);
        const data = await res.json();

        const statusDiv = document.getElementById('user-status-display');
        const upgradeBtn = document.getElementById('upgrade-btn');

        if (data.is_pro) {
          statusDiv.innerHTML = `<div class="pro-badge-header">💎 PRO ACCOUNT</div>`;
          upgradeBtn.classList.add('hidden');
        } else {
          statusDiv.innerHTML = `<div style="font-size: 0.75rem; color: var(--muted)">Downloads today: ${data.downloads_today}/${data.limit}</div>`;
          upgradeBtn.classList.remove('hidden');
        }
      } catch (e) { console.error('Status check failed'); }
    }

    async function upgradeToPro() {
      const btn = document.getElementById('upgrade-btn');
      btn.disabled = true;
      btn.innerText = "Redirecting...";

      try {
        const res = await fetch(`${API}/create-checkout-session`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId })
        });
        const { url } = await res.json();
        window.location.href = url;
      } catch (e) {
        alert("Payment system error. Please try again.");
        btn.disabled = false;
        btn.innerText = "⭐ Upgrade to PRO";
      }
    }

    checkUserStatus();
    setInterval(checkUserStatus, 30000);

    function setMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;

      const switcher = document.getElementById('mode-switcher');
      const videoBadges = document.getElementById('video-badges');
      const musicBadges = document.getElementById('music-badges');
      const urlInput = document.getElementById('url-input');
      const btns = switcher.querySelectorAll('.mode-btn');

      if (mode === 'music') {
        switcher.classList.add('music-active');
        btns[1].classList.add('active');
        btns[0].classList.remove('active');

        // Animate badges
        videoBadges.classList.add('hidden');
        musicBadges.classList.remove('hidden');
        urlInput.placeholder = "Paste music link (Spotify, SoundCloud, YT)…";
      } else {
        switcher.classList.remove('music-active');
        btns[0].classList.add('active');
        btns[1].classList.remove('active');

        // Animate badges
        musicBadges.classList.add('hidden');
        videoBadges.classList.remove('hidden');
        urlInput.placeholder = "Paste video URL here…";
      }

      // Re-render data if we have it
      if (lastFetchedData) {
        renderData(lastFetchedData, lastFetchedUrl);
      }
    }

    function renderData(data, url) {
      const result = document.getElementById('result');

      const thumb = data.thumbnail
        ? `<img class="thumb" src="${data.thumbnail}" alt="thumbnail" onerror="this.style.display='none'" />`
        : `<div class="thumb-placeholder">🎬</div>`;

      const duration = data.duration ? `<div class="duration">⏱ ${fmtDuration(data.duration)}</div>` : '';

      let formatsHtml = '';
      const showVideoFormats = currentMode === 'video';

      if (showVideoFormats && data.formats && data.formats.length > 0) {
        formatsHtml = data.formats.map(f => {
          const fmtSize = f.filesize
            ? (f.filesize / 1024 / 1024).toFixed(1) + " MB"
            : "unknown size";
          return `
          <div class="fmt-row">
            <div>
              <div class="fmt-res">${f.resolution}</div>
              <div class="fmt-info">${f.ext.toUpperCase()} · ${fmtSize}</div>
            </div>
            <button class="btn btn-dl" onclick="downloadFile('${url}', '${f.format_id}', '${f.ext}', false, this)">⬇ Download</button>
          </div>`;
        }).join('');
      }

      const formatsLabel = (showVideoFormats && formatsHtml) ? `<div class="formats-label">Available Formats</div>` : '';
      const formatsGrid = (showVideoFormats && formatsHtml) ? `<div class="formats-grid">${formatsHtml}</div>` : '';
      const divider = showVideoFormats ? `<hr class="divider"/>` : '';

      result.innerHTML = `
      <div class="video-info">
        ${thumb}
        <div class="video-meta">
          <h2>${data.title}</h2>
          ${duration}
        </div>
      </div>
      ${formatsLabel}
      ${formatsGrid}
      ${divider}
      <button class="btn btn-audio" onclick="downloadFile('${url}', null, 'mp3', true, this)">🎵 Download Audio Only (MP3)</button>`;
    }

    function fmtDuration(sec) {
      if (!sec) return "";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    async function downloadFile(url, format_id, ext, audio_only, btn) {
      if (btn.disabled) return;

      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>Requesting...</span>';

      const progressContainer = document.getElementById('progress-container');
      const statusText = document.getElementById('status-text');
      const statusPct = document.getElementById('status-pct');
      const progressFill = document.getElementById('progress-fill');
      const saveBtn = document.getElementById('save-btn');

      try {
        const res = await fetch(`${API}/start-download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, format_id, ext, audio_only, user_id: userId })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Download failed");
        }

        const job_id = data.job_id;
        checkUserStatus(); // Update count

        progressContainer.style.display = 'block';
        saveBtn.style.display = 'none';

        const poll = setInterval(async () => {
          try {
            const pRes = await fetch(`${API}/progress/${job_id}`);
            const job = await pRes.json();

            if (job.status === 'ready') {
              clearInterval(poll);
              statusText.innerText = 'Ready!';
              statusPct.innerText = '100%';
              progressFill.style.width = '100%';

              // Trigger automatic download
              const dlUrl = job.download_url || `${API}/download-file/${job_id}`;
              window.location.href = dlUrl;

              // Refresh user status counter
              checkUserStatus();

              saveBtn.style.display = 'flex';
              saveBtn.onclick = () => { window.location.href = dlUrl; };
              btn.disabled = false;
              btn.innerHTML = originalHtml;
            } else if (job.status === 'error') {
              clearInterval(poll);
              statusText.innerText = 'Error';
              alert('Download failed: ' + job.error);
              btn.disabled = false;
              btn.innerHTML = originalHtml;
            } else {
              statusText.innerText = job.status + '...';
              statusPct.innerText = Math.round(job.progress) + '%';
              progressFill.style.width = job.progress + '%';
            }
          } catch (e) { console.error('Polling error', e); }
        }, 1000);
      } catch (err) {
        alert('Could not start download');
        btn.disabled = false;
        btn.innerHTML = originalHtml;
      }
    }

    async function fetchFormats() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) {
        alert("Please enter a URL!");
        return;
      }

      const btn = document.getElementById('fetch-btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      result.innerHTML = '';

      try {
        // Detect Spotify Playlist and redirect
        if (url.includes('spotify.com/playlist/')) {
          const path = window.location.pathname.replace('index.html', '');
          window.location.href = `${path}playlist.html?url=${encodeURIComponent(url)}`;
          return;
        }

        const res = await fetch(`${API}/formats?url=${encodeURIComponent(url)}&user_id=${userId}`);
        const data = await res.json();
        lastFetchedData = data;
        lastFetchedUrl = url;

        if (!res.ok) {
          result.innerHTML = `<div class="error-box">❌ ${data.detail || 'Unknown error'}</div>`;
          return;
        }

        renderData(data, url);

      } catch (err) {
        result.innerHTML = `<div class="error-box">❌ Error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Fetch</span>';
      }
    }

    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchFormats();
    });

    async function pasteURL() {
      const btn = document.getElementById('paste-btn');
      const originalHtml = btn.innerHTML;

      try {
        if (!navigator.clipboard || !navigator.clipboard.readText) {
          throw new Error('Clipboard API not supported');
        }

        const text = await navigator.clipboard.readText();
        if (text) {
          document.getElementById('url-input').value = text.trim();
          btn.innerHTML = '<span>✅ Pasted!</span>';
          setTimeout(() => {
            btn.innerHTML = originalHtml;
          }, 2000);
        } else {
          alert('Clipboard is empty!');
        }
      } catch (err) {
        console.error('Failed to read clipboard:', err);
        alert('Could not access clipboard. Please paste manually.');
      }
    }
  </script>
